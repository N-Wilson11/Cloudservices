name: Node CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  test-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - photo-prestige
          - auth-service
          - register-service
          - clock-service
          - score-service
          - mail-service
          - target-service
          - clock-service

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
