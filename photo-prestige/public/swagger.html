<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Prestige API Docs</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
    <style>
      body {
        margin: 0;
        background: #f4f7fb;
      }
      .top {
        font-family: sans-serif;
        padding: 12px 16px;
        background: #0d2538;
        color: #fff;
      }
      .top a {
        color: #8fe3c4;
      }
    </style>
  </head>
  <body>
    <div class="top">
      Photo Prestige API docs | Gateway base URL: http://localhost:3000 | <a href="/">Home</a>
    </div>
    <div id="swagger-ui"></div>

    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
      window.ui = SwaggerUIBundle({
        url: '/openapi.json',
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis],
        layout: 'BaseLayout'
      });
    </script>
  </body>
</html>
