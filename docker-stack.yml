services:
  gateway-lb:
    image: nginx:1.27-alpine
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
        mode: ingress
    configs:
      - source: gateway_lb_conf
        target: /etc/nginx/conf.d/default.conf
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  photo-prestige:
    image: photo-prestige:swarm
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3001
      - TARGET_SERVICE_URL=http://target-service:3002
      - REGISTER_SERVICE_URL=http://register-service:3003
      - SCORE_SERVICE_URL=http://score-service:3005
      - CLOCK_SERVICE_URL=http://clock-service:3004
      - READ_SERVICE_URL=http://read-service:3007
      - MAIL_SERVICE_URL=http://mail-service:3006
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      - RABBITMQ_EXCHANGE=${RABBITMQ_EXCHANGE:-photo-prestige}
      - RABBITMQ_RECONNECT_DELAY_MS=${RABBITMQ_RECONNECT_DELAY_MS:-5000}
      - GATEWAY_PROXY_TIMEOUT_MS=${GATEWAY_PROXY_TIMEOUT_MS:-5000}
      - GATEWAY_RETRY_ATTEMPTS=${GATEWAY_RETRY_ATTEMPTS:-3}
      - GATEWAY_RETRY_DELAY_MS=${GATEWAY_RETRY_DELAY_MS:-250}
      - GATEWAY_CIRCUIT_BREAKER_THRESHOLD=${GATEWAY_CIRCUIT_BREAKER_THRESHOLD:-3}
      - GATEWAY_CIRCUIT_BREAKER_RESET_TIMEOUT_MS=${GATEWAY_CIRCUIT_BREAKER_RESET_TIMEOUT_MS:-10000}
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        order: start-first
      restart_policy:
        condition: on-failure

  auth-service:
    image: auth-service:swarm
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
      - MONGODB_URI=${AUTH_MONGODB_URI:-mongodb://mongodb:27017/photo-prestige}
      - JWT_SECRET=${JWT_SECRET:-change-this-in-real-deployments}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-1d}
      - SEED_OWNER_EMAIL=${SEED_OWNER_EMAIL:-}
      - SEED_OWNER_PASSWORD=${SEED_OWNER_PASSWORD:-}
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  target-service:
    image: target-service:swarm
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3002
      - MONGODB_URI=${TARGET_MONGODB_URI:-mongodb://mongodb:27017/photo-prestige}
      - JWT_SECRET=${JWT_SECRET:-change-this-in-real-deployments}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      - RABBITMQ_EXCHANGE=${RABBITMQ_EXCHANGE:-photo-prestige}
      - RABBITMQ_RECONNECT_DELAY_MS=${RABBITMQ_RECONNECT_DELAY_MS:-5000}
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  register-service:
    image: register-service:swarm
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3003
      - MONGODB_URI=${REGISTER_MONGODB_URI:-mongodb://register-mongodb:27017/register-service}
      - JWT_SECRET=${JWT_SECRET:-change-this-in-real-deployments}
      - TARGET_SERVICE_URL=http://target-service:3002
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      - RABBITMQ_EXCHANGE=${RABBITMQ_EXCHANGE:-photo-prestige}
      - RABBITMQ_RECONNECT_DELAY_MS=${RABBITMQ_RECONNECT_DELAY_MS:-5000}
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  score-service:
    image: score-service:swarm
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3005
      - MONGODB_URI=${SCORE_MONGODB_URI:-mongodb://score-mongodb:27017/score-service}
      - JWT_SECRET=${JWT_SECRET:-change-this-in-real-deployments}
      - AUTH_SERVICE_URL=http://auth-service:3001
      - REGISTER_SERVICE_URL=http://register-service:3003
      - TARGET_SERVICE_URL=http://target-service:3002
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      - RABBITMQ_EXCHANGE=${RABBITMQ_EXCHANGE:-photo-prestige}
      - RABBITMQ_RECONNECT_DELAY_MS=${RABBITMQ_RECONNECT_DELAY_MS:-5000}
      - IMAGGA_API_KEY=${IMAGGA_API_KEY:-}
      - IMAGGA_API_SECRET=${IMAGGA_API_SECRET:-}
      - IMAGGA_API_BASE_URL=${IMAGGA_API_BASE_URL:-https://api.imagga.com/v2}
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  read-service:
    image: read-service:swarm
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3007
      - TARGET_SERVICE_URL=http://target-service:3002
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  clock-service:
    image: clock-service:swarm
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3004
      - MONGODB_URI=${CLOCK_MONGODB_URI:-mongodb://clock-mongodb:27017/clock-service}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      - RABBITMQ_EXCHANGE=${RABBITMQ_EXCHANGE:-photo-prestige}
      - RABBITMQ_RECONNECT_DELAY_MS=${RABBITMQ_RECONNECT_DELAY_MS:-5000}
      - DEADLINE_REMINDER_MINUTES=${DEADLINE_REMINDER_MINUTES:-60}
      - DEADLINE_REMINDER_INTERVAL_MINUTES=${DEADLINE_REMINDER_INTERVAL_MINUTES:-60}
      - CLOCK_POLL_INTERVAL_MS=${CLOCK_POLL_INTERVAL_MS:-5000}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  mail-service:
    image: mail-service:swarm
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3006
      - MAIL_MONGODB_URI=${MAIL_MONGODB_URI:-mongodb://mail-mongodb:27017/mail-service}
      - JWT_SECRET=${JWT_SECRET:-change-this-in-real-deployments}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      - RABBITMQ_EXCHANGE=${RABBITMQ_EXCHANGE:-photo-prestige}
      - RABBITMQ_RECONNECT_DELAY_MS=${RABBITMQ_RECONNECT_DELAY_MS:-5000}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - MAIL_FROM=${MAIL_FROM:-Photo Prestige <noreply@example.com>}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  mongodb:
    image: mongo:7
    volumes:
      - mongodb_data:/data/db
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  register-mongodb:
    image: mongo:7
    volumes:
      - register_mongodb_data:/data/db
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  score-mongodb:
    image: mongo:7
    volumes:
      - score_mongodb_data:/data/db
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  clock-mongodb:
    image: mongo:7
    volumes:
      - clock_mongodb_data:/data/db
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  mail-mongodb:
    image: mongo:7
    volumes:
      - mail_mongodb_data:/data/db
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - target: 15672
        published: 15672
        protocol: tcp
        mode: ingress
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

configs:
  gateway_lb_conf:
    file: ./nginx/gateway-lb.conf

volumes:
  mongodb_data:
  register_mongodb_data:
  score_mongodb_data:
  clock_mongodb_data:
  mail_mongodb_data:
  rabbitmq_data:
